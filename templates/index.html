<!DOCTYPE html>
<html>
<head>
    <title>Players</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<h1>Football Players</h1>

<ul id="player-list"></ul>

<h2>Add Player</h2>
<input type="text" id="name" placeholder="Name">
<input type="number" id="goals" placeholder="Goals">
<button onclick="addPlayer()">Add Player</button>

<script>
async function loadPlayers() {
    const response = await fetch('/players');
    const players = await response.json();

    const list = document.getElementById('player-list');
    list.innerHTML = '';

players.forEach(player => {
    const li = document.createElement('li');

    li.textContent = player.name + " - Goals: " + player.goals + "  ";

    // DELETE BUTTON
    const deleteBtn = document.createElement('button');
    deleteBtn.textContent = "Delete";

    deleteBtn.onclick = async () => {
        await fetch('/players/' + player.id, {
            method: 'DELETE'
        });
        loadPlayers();
    };

    // UPDATE BUTTON
    const updateBtn = document.createElement('button');
    updateBtn.textContent = "Edit";

    updateBtn.onclick = async () => {
        const newName = prompt("Enter new name:", player.name);
        const newGoals = prompt("Enter new goals:", player.goals);

        if (newName && newGoals) {
            await fetch('/players/' + player.id, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    name: newName,
                    goals: parseInt(newGoals)
                })
            });

            loadPlayers();  // refresh list
        }
    };

    li.appendChild(updateBtn);
    li.appendChild(deleteBtn);
    list.appendChild(li);
});
}

async function addPlayer() {
    const name = document.getElementById('name').value;
    const goals = document.getElementById('goals').value;

    await fetch('/players', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ name, goals })
    });

    loadPlayers();

    // clear inputs after adding
    document.getElementById('name').value = "";
    document.getElementById('goals').value = "";
}

loadPlayers();  // load players on page start
</script>

</body>
</html>
