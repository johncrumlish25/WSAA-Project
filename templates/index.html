<!DOCTYPE html>
<html>
<head>
    <title>Football Players</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">

    <div class="text-center mb-5">
        <h1 class="fw-bold">Football Players</h1>
        <p class="text-muted">Manage goal stats using a REST API</p>
    </div>

    <div class="row">
        <!-- PLAYER LIST -->
        <div class="col-md-7">
            <div id="player-list"></div>
        </div>

        <!-- ADD PLAYER FORM -->
        <div class="col-md-5">
            <div class="card shadow-sm p-4">
                <h4 class="mb-3">Add Player</h4>

                <input type="text" id="name" class="form-control mb-2" placeholder="Player Name">
                <input type="number" id="goals" class="form-control mb-3" placeholder="Goals">

                <button class="btn btn-primary w-100" onclick="addPlayer()">Add Player</button>
            </div>
        </div>
    </div>

</div>

<script>
async function loadPlayers() {
    const response = await fetch('/players');
    const players = await response.json();

    const list = document.getElementById('player-list');
    list.innerHTML = '';

    players.forEach(player => {
        const card = document.createElement('div');
        card.className = "card mb-3 shadow-sm";

        card.innerHTML = `
            <div class="card-body d-flex justify-content-between align-items-center">
                <div>
                    <h5 class="mb-1">${player.name}</h5>
                    <span class="badge bg-success">Goals: ${player.goals}</span>
                </div>
                <div>
                    <button class="btn btn-sm btn-warning me-2">Edit</button>
                    <button class="btn btn-sm btn-danger">Delete</button>
                </div>
            </div>
        `;

        const buttons = card.querySelectorAll("button");
        const updateBtn = buttons[0];
        const deleteBtn = buttons[1];

        deleteBtn.onclick = async () => {
            await fetch('/players/' + player.id, { method: 'DELETE' });
            loadPlayers();
        };

        updateBtn.onclick = async () => {
            const newName = prompt("Enter new name:", player.name);
            const newGoals = prompt("Enter new goals:", player.goals);

            if (newName && newGoals) {
                await fetch('/players/' + player.id, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: newName,
                        goals: parseInt(newGoals)
                    })
                });

                loadPlayers();
            }
        };

        list.appendChild(card);
    });
}

async function addPlayer() {
    const name = document.getElementById('name').value;
    const goals = document.getElementById('goals').value;

    if (!name || !goals) return;

    await fetch('/players', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, goals })
    });

    loadPlayers();

    document.getElementById('name').value = "";
    document.getElementById('goals').value = "";
}

loadPlayers();
</script>

</body>
</html>
